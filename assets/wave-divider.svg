<svg xmlns="http://www.w3.org/2000/svg" width="900" height="140" viewBox="0 0 900 140" role="img" aria-label="">
  <defs>
    <linearGradient id="tone" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8E3B46"/>
      <stop offset="0.5" stop-color="#C25E6B"/>
      <stop offset="1" stop-color="#8E3B46"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.08" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.92" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="edges">
      <rect x="0" y="0" width="900" height="140" fill="url(#fade)"/>
    </mask>
  </defs>
  <style>
    .w1 { animation: drift 26s linear infinite; }
    .w2 { animation: drift 40s linear infinite reverse; }
    @keyframes drift { to { transform: translateX(-150px); } }
    @media (prefers-reduced-motion: reduce) {
      .w1, .w2 { animation: none; }
    }
  </style>
  <g mask="url(#edges)">
    <g class="w1">
      <path d="M0,115 c25,-9 50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0"
            fill="none" stroke="url(#tone)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    </g>
    <g transform="translate(-75,0)">
      <g class="w2">
        <path d="M0,115 c25,-9 50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0 s50,9 75,0 s50,-9 75,0"
              fill="none" stroke="#8E3B46" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      </g>
    </g>
  </g>
</svg>
